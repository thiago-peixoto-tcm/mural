name: Robô Diário de Detalhes das Licitações

on:
  schedule:
    # Executa diariamente às 05:31 no Horário de Brasília (08:31 UTC)
    - cron: '31 8 * * *'
  workflow_dispatch: # Execução manual

jobs:
  executar-detalhes:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências e Navegador
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth playwright beautifulsoup4
          playwright install chromium
          playwright install-deps

      - name: Criar arquivo de credenciais do Google
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_DRIVE_JSON }}
        run: |
          echo "$GOOGLE_JSON" > credentials.json

      - name: Executar Robô de Fichas Detalhadas
        run: |
          python extrair_detalhes.py
