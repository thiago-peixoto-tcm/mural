name: Robô Diário de Licitações

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write  # <--- Dá permissão para salvar arquivos no repositório

jobs:
  executar-script:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o Python no servidor
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar as bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Executar o Script de Raspagem
        run: |
          python atualizar_base.py

      - name: Salvar o CSV atualizado no repositório
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add licitacoes_tcm_pa.csv
          git commit -m "Atualização automática das licitações" || exit 0
          git push  
