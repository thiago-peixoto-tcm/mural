name: Robô Diário de Licitações

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  executar-script:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Permite até 6 horas de execução para processar as 4.675 páginas

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread google-auth

      - name: Criar arquivo de credenciais do Google
        run: |
          echo "${{ secrets.GOOGLE_DRIVE_JSON }}" > credentials.json

      - name: Executar Raspagem e Atualizar Google Sheets
        run: |
          python atualizar_base.py
