name: Executar Apenas Detalhamento

on:
  workflow_dispatch: # Permite disparar manualmente pelo botão

jobs:
  run-detalhamento:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar Código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas beautifulsoup4 google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Executar Apenas o Robô de Detalhamento
      env:
        GOOGLE_DRIVE_JSON: ${{ secrets.GOOGLE_DRIVE_JSON }}
      run: python detalhar_fichas.py
